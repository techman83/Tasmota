<style>
  .border {
    display: none;
    margin-top: 5px;
    padding: 1px;
    border: 1px solid var(--c_txt);
    background-color: black;
    box-sizing: border-box;
  }

  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
<table style="width: 100%;">
  <tbody>
    <tr>
      <td>
        <button id="lvBtn">LVGL screen mirroring</button>
        <div class="border">
          <canvas id="canvas"></canvas>
        </div>
      </td>
    </tr>
  </tbody>
</table>
<script>
  const LV_MAGIC = 0x564C;
  const HEADER_WORDS = 5; // 10 bytes: 2(LV) + 2(x) + 2(y) + 2(w) + 2(h)
  const RGB565_LUT = new Uint32Array(0x10000);

  const lvBtn = document.getElementById('lvBtn');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext("2d");

  let abortController = null;
  let isStreaming = false;
  let dataBuf, readBuf, writeBuf, imageData, imgBuf;
  let touchPos = null;
  let touchPressed = false;

  // RGB565 to ARGB8888 (Little Endian: AABBGGRR) using bit replication
  for (let p = 0; p < 0x10000; p++) {
    RGB565_LUT[p] = 0xFF000000 | // Alpha (opaque)
      (((p & 0xF800) >>> 8) | ((p & 0xE000) >>> 13)) | // R 5-bit abcde -> abcdeabc
      (((p & 0x07E0) << 5) | ((p & 0x0600) >>> 1)) |   // G 6-bit abcdef -> abcdefab
      (((p & 0x001F) << 19) | ((p & 0x001C) << 14));   // B 5-bit abcde -> abcdeabc
  }

  async function startStream(url) {
    const border = canvas.parentElement;
    border.style.display = 'block';
    abortController = new AbortController();
    var width = 0;
    var height = 0;
    try {
      const response = await fetch(url, { signal: abortController.signal });
      const screenSize = response.headers.get('Screen-Size');
      if (screenSize) {
        [width, height] = screenSize.split('x').map(Number);
        if (!imageData) {
          const parentWidth = border.parentElement.clientWidth;
          border.style.width = parentWidth + 'px';
          border.style.height = (parentWidth * height / width) + 'px';
          canvas.width = width;
          canvas.height = height;
          dataBuf = new Uint8Array((HEADER_WORDS + (width * height)) * 2);
          readBuf = new Uint16Array(dataBuf.buffer);
          writeBuf = new Uint16Array(width * height);
          imageData = ctx.createImageData(width, height);
          imgBuf = new Uint32Array(imageData.data.buffer);
        }
        isStreaming = true;
      } else {
        console.error('Expecting screen size header.');
        stopStream();
        return;
      }
      const reader = response.body.getReader();
      let dataOffset = 0;
      let readOffset = 0;
      let headerParsed = false;
      let expectedPixels = 0;
      let writeOffset = 0;
      let x = 0, y = 0, w = 0, h = 0;
      while (isStreaming) {
        const { value, done } = await reader.read();
        if (done) break;
        dataBuf.set(value, dataOffset);
        dataOffset += value.length;
        const totalWords = dataOffset >> 1;
        while (true) {
          if (!headerParsed) {
            if (totalWords - readOffset < HEADER_WORDS) break;
            [magic, x, y, w, h] = readBuf.subarray(readOffset);
            if (magic !== LV_MAGIC) {
              console.error("Sync Error: No magic found");
              stopStream();
              return;
            }
            expectedPixels = w * h;
            readOffset += HEADER_WORDS;
            writeOffset = 0;
            iIdx = y * width + x;
            iInc = width - w;
            wIdx = 0;
            headerParsed = true;
          }
          while (readOffset < totalWords && writeOffset < expectedPixels) {
            const header = readBuf[readOffset];
            const isRun = header & 0x8000;
            const count = (header & 0x7FFF) + (isRun ? 2 : 1);
            if (totalWords < readOffset + 1 + (isRun ? 1 : count)) break;
            readOffset++;
            if (isRun) {
              writeBuf.fill(readBuf[readOffset++], writeOffset, writeOffset + count);
            } else {
              writeBuf.set(readBuf.subarray(readOffset, readOffset + count), writeOffset);
              readOffset += count;
            }
            writeOffset += count;
          }
          if (writeOffset < expectedPixels) break;
          for (let r = 0; r < h; r++, iIdx += iInc) {
            for (let c = 0; c < w; c++) {
              imgBuf[iIdx++] = RGB565_LUT[writeBuf[wIdx++]];
            }
          }
          ctx.putImageData(imageData, 0, 0, x, y, w, h);
          headerParsed = false;
        }
        if (readOffset === totalWords) {
          dataOffset = 0;
        } else {
          const consumedBytes = readOffset * 2;
          const remainingBytes = dataOffset - consumedBytes;
          dataBuf.copyWithin(0, consumedBytes, dataOffset);
          dataOffset = remainingBytes;
        }
        readOffset = 0;
      }
    } catch (err) {
      if (err.name !== 'AbortError') console.error("Stream Error: ", err);
    } finally {
      stopStream();
    }
  }

  function stopStream() {
    canvas.parentElement.style.display = 'none';
    isStreaming = false;
    if (abortController) {
      abortController.abort();
    }
    if (imageData) {
      imgBuf.fill(0);
      ctx.putImageData(imageData, 0, 0);
      imageData = undefined
    }
  }

  function sendTouch(t) {
    fetch(`http://${getHost()}/lvgl_touch`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ ...touchPos, t }).toString()
    }).catch(() => { });
  }

  function updatePos(e) {
    const r = canvas.getBoundingClientRect();
    touchPos = {
      x: Math.round((e.clientX - r.left) * (canvas.width / r.width)),
      y: Math.round((e.clientY - r.top) * (canvas.height / r.height))
    };
  }

  setInterval(() => { if (touchPressed) sendTouch(1); }, 50);

  canvas.addEventListener("mousedown", (e) => { e.preventDefault(); if (e.button === 0) { touchPressed = true; updatePos(e); } });
  canvas.addEventListener("mousemove", (e) => { e.preventDefault(); if (e.buttons === 1) updatePos(e); });
  canvas.addEventListener("mouseup", (e) => { e.preventDefault(); if (e.button === 0) { touchPressed = false; sendTouch(0); } });
  window.addEventListener("mouseup", (e) => { if (e.button === 0) touchPressed = false; });

  lvBtn.addEventListener('click', (e) => {
    const host = getHost();
    isStreaming ? stopStream() : startStream(`http://${host}:8881`);
  });

  function getHost() {
    return window.location.hostname || 'localhost';
  }
</script>
